pipeline:
  roles:
    coder:
      type: doer
      display-name: "Coder"
      description: "Implements code changes in isolated worktrees"
      timeouts:
        execution: 2h
        poll-interval: 30s
        max-wait: 30m
      allowed-operations:
        - write-checkpoint
        - submit-for-review
        - mark-blocked
        - handoff
        - await-verdict
      context-sections:
        - assigned-task
        - worktree-rules
        - collective-plan-scoping
        - handoff-resume
        - integration-fix
        - prior-rejection
        - prior-attempt
        - doer-state-transitions
        - coder-tools
        - anomaly-logging
        - blocking-protocol
        - commit-workflow
        - implementation-phase
        - submission-phase
        - mandatory-docs
        - skills-affinity
      skills:
        - debugging
        - testing
        - clean-code
      mandatory-docs: []
    code-reviewer:
      type: reviewer
      display-name: "Code Reviewer"
      description: "Reviews code changes, issues binding verdicts"
      timeouts:
        execution: 30m
        poll-interval: 30s
        max-wait: 30m
      allowed-operations:
        - submit-verdict
        - await-resubmission
      context-sections:
        - review-task
        - worktree-rules
        - collective-plan-scoping
        - scope-extensions
        - prior-rejection
        - reviewer-state-transitions
        - code-reviewer-tools
        - anomaly-logging
        - review-instructions
        - rejection-format
        - verdict-submission
        - mandatory-docs
        - skills-affinity
      skills:
        - code-review
        - systemic-thinking
        - software-architecture-review
      mandatory-docs: []
    orchestrator:
      type: orchestrator
      display-name: "Orchestrator"
      description: "Decomposes goals, manages sprint lifecycle"
      max-instances: 1
      timeouts:
        execution: 4h
        poll-interval: 60s
        max-wait: 30m
      allowed-operations:
        - add-tasks
        - supersede-task
        - sprint-checkpoint
        - analyze
        - delete-agent
        - clear-stale-review-claims
        - update-sprint-metrics
      context-sections:
        - orchestrator-dashboard
        - wake-instructions
        - mandatory-docs
        - skills-affinity
      skills:
        - systemic-thinking
      mandatory-docs: []
    epic-planner:
      type: doer
      display-name: "Epic Planner"
      context-sections:
        - assigned-task
        - worktree-rules
        - collective-plan-scoping
        - prior-rejection
        - prior-attempt
        - integration-fix
        - doer-state-transitions
        - epic-planner-tools
        - capability-scoping
        - implementation-phase
        - mandatory-docs
        - skills-affinity
      skills:
        - epic-writing
        - systemic-thinking
      mandatory-docs: []
    epic-plan-reviewer:
      type: reviewer
      display-name: "Epic Plan Reviewer"
      context-sections:
        - review-task
        - worktree-rules
        - collective-plan-scoping
        - prior-rejection
        - reviewer-state-transitions
        - epic-plan-reviewer-tools
        - anomaly-logging
        - review-instructions
        - rejection-format
        - verdict-submission
        - mandatory-docs
        - skills-affinity
      skills:
        - spec-review
        - systemic-thinking
      mandatory-docs: []
    us-writer:
      type: doer
      display-name: "US Writer"
      context-sections:
        - assigned-task
        - worktree-rules
        - collective-plan-scoping
        - prior-rejection
        - prior-attempt
        - integration-fix
        - doer-state-transitions
        - us-writer-tools
        - capability-scoping
        - implementation-phase
        - mandatory-docs
        - skills-affinity
      skills:
        - user-story-writing
      mandatory-docs: []
    us-reviewer:
      type: reviewer
      display-name: "US Reviewer"
      context-sections:
        - review-task
        - worktree-rules
        - collective-plan-scoping
        - prior-rejection
        - reviewer-state-transitions
        - us-reviewer-tools
        - anomaly-logging
        - review-instructions
        - rejection-format
        - verdict-submission
        - mandatory-docs
        - skills-affinity
      skills:
        - spec-review
      mandatory-docs: []
    code-planner:
      type: doer
      display-name: "Code Planner"
      context-sections:
        - assigned-task
        - worktree-rules
        - collective-plan-scoping
        - prior-rejection
        - prior-attempt
        - integration-fix
        - doer-state-transitions
        - code-planner-tools
        - task-decomposition
        - implementation-phase
        - mandatory-docs
        - skills-affinity
      skills:
        - software-architecture-review
      mandatory-docs: []
    code-plan-reviewer:
      type: reviewer
      display-name: "Code Plan Reviewer"
      context-sections:
        - review-task
        - worktree-rules
        - collective-plan-scoping
        - prior-rejection
        - reviewer-state-transitions
        - code-plan-reviewer-tools
        - anomaly-logging
        - review-instructions
        - rejection-format
        - verdict-submission
        - mandatory-docs
        - skills-affinity
      skills:
        - software-architecture-review
        - systemic-thinking
      mandatory-docs: []
    architect:
      type: doer
      display-name: "Architect"
      context-sections:
        - assigned-task
        - parent-tasks-context
        - worktree-rules
        - prior-rejection
        - prior-attempt
        - integration-fix
        - doer-state-transitions
        - architect-tools
        - implementation-phase
        - mandatory-docs
        - skills-affinity
      skills:
        - software-architecture-review
      mandatory-docs: []
    architecture-reviewer:
      type: reviewer
      display-name: "Architecture Reviewer"
      context-sections:
        - review-task
        - worktree-rules
        - prior-rejection
        - reviewer-state-transitions
        - architecture-reviewer-tools
        - anomaly-logging
        - review-instructions
        - rejection-format
        - verdict-submission
        - mandatory-docs
        - skills-affinity
      skills:
        - systemic-thinking
      mandatory-docs: []

  role-pairs:
    epic-planning-pair:
      doer: epic-planner
      reviewer: epic-plan-reviewer
      states:
        initial: DRAFT_EPIC_PLAN
        executing: EPIC_PLANNING
        submitted: EPIC_PLAN_TO_REVIEW
        reviewing: REVIEWING_EPIC_PLAN
        approved: EPIC_PLAN_APPROVED
        rejected: EPIC_PLAN_REJECTED

    us-writing-pair:
      doer: us-writer
      reviewer: us-reviewer
      states:
        initial: DRAFT_US
        executing: WRITING_US
        submitted: US_READY_FOR_REVIEW
        reviewing: REVIEWING_US
        approved: US_APPROVED
        rejected: US_REJECTED

    code-planning-pair:
      doer: code-planner
      reviewer: code-plan-reviewer
      states:
        initial: DRAFT_CODING_PLAN
        executing: CODE_PLANNING
        submitted: CODING_PLAN_TO_REVIEW
        reviewing: REVIEWING_CODING_PLAN
        approved: CODING_PLAN_APPROVED
        rejected: CODING_PLAN_REJECTED

    coding-pair:
      doer: coder
      reviewer: code-reviewer
      review-policy:
        quorum: 1
      states:
        initial: DRAFT_CODE
        executing: IMPLEMENTING_CODE
        submitted: CODE_READY_FOR_REVIEW
        reviewing: REVIEWING_CODE
        approved: CODE_APPROVED
        rejected: CODE_REJECTED

    architecture-pair:
      doer: architect
      reviewer: architecture-reviewer
      states:
        initial: DRAFT_ARCHITECTURE
        executing: ARCHITECTING
        submitted: ARCHITECTURE_TO_REVIEW
        reviewing: REVIEWING_ARCHITECTURE
        approved: ARCHITECTURE_APPROVED
        rejected: ARCHITECTURE_REJECTED

  sub-pipelines:
    epic-spec-subpipeline:
      steps:
        - epic-planning-pair
        - us-writing-pair
      transitions:
        - name: epic-to-us
          from: epic-planning-pair.approved
          to: us-writing-pair.initial
          trigger: manual
          cardinality: per-subtask

    coding-subpipeline:
      steps:
        - architecture-pair
        - code-planning-pair
        - coding-pair
      transitions:
        - name: architecture-to-code-plan
          from: architecture-pair.approved
          to: code-planning-pair.initial
          trigger: manual
          cardinality: per-subtask
        - name: code-plan-to-coding
          from: code-planning-pair.approved
          to: coding-pair.initial
          trigger: manual
          cardinality: per-subtask

  pipeline-transitions:
    - name: us-to-coding
      from: epic-spec-subpipeline.us-writing-pair.approved
      to: coding-subpipeline.architecture-pair.initial
      trigger: manual
      cardinality: many-to-one

  entry-points:
    general-objective: epic-spec-subpipeline.epic-planning-pair
    detailed-spec: coding-subpipeline.architecture-pair
