pipeline:
  roles:
    orchestrator:
      type: orchestrator
      display-name: "Orchestrator"
      description: "Decomposes goals, manages sprint lifecycle"
      max-instances: 1
      timeouts:
        execution: 4h
        poll-interval: 60s
        max-wait: 30m
      allowed-operations:
        - add-tasks
        - supersede-task
        - sprint-checkpoint
        - analyze
        - delete-agent
        - clear-stale-review-claims
        - update-sprint-metrics
      skills:
        - systemic-thinking
      mandatory-docs: []

    epic-planner:
      type: doer
      display-name: "Epic Planner"
      description: "Decomposes objectives into structured epics"
      timeouts:
        execution: 2h
        poll-interval: 30s
        max-wait: 30m
      allowed-operations:
        - write-checkpoint
        - submit-for-review
        - mark-blocked
        - handoff
        - set-task-output
      skills:
        - epic-writing
        - systemic-thinking
      mandatory-docs: []

    epic-plan-reviewer:
      type: reviewer
      display-name: "Epic Plan Reviewer"
      description: "Reviews epic plans, issues binding verdicts"
      timeouts:
        execution: 30m
        poll-interval: 30s
        max-wait: 30m
      allowed-operations:
        - submit-verdict
      skills:
        - spec-review
        - systemic-thinking
      mandatory-docs: []

    us-writer:
      type: doer
      display-name: "US Writer"
      description: "Transforms epics into user stories"
      timeouts:
        execution: 2h
        poll-interval: 30s
        max-wait: 30m
      allowed-operations:
        - write-checkpoint
        - submit-for-review
        - mark-blocked
        - handoff
        - set-task-output
      skills:
        - user-story-writing
      mandatory-docs: []

    us-reviewer:
      type: reviewer
      display-name: "US Reviewer"
      description: "Reviews user stories, issues binding verdicts"
      timeouts:
        execution: 30m
        poll-interval: 30s
        max-wait: 30m
      allowed-operations:
        - submit-verdict
      skills:
        - spec-review
      mandatory-docs: []

    code-planner:
      type: doer
      display-name: "Code Planner"
      description: "Creates implementation plans from specs"
      timeouts:
        execution: 2h
        poll-interval: 30s
        max-wait: 30m
      allowed-operations:
        - write-checkpoint
        - submit-for-review
        - mark-blocked
        - handoff
        - set-task-output
      skills:
        - software-architecture-review
      mandatory-docs: []

    code-plan-reviewer:
      type: reviewer
      display-name: "Code Plan Reviewer"
      description: "Reviews implementation plans, issues binding verdicts"
      timeouts:
        execution: 30m
        poll-interval: 30s
        max-wait: 30m
      allowed-operations:
        - submit-verdict
      skills:
        - software-architecture-review
        - systemic-thinking
      mandatory-docs: []

    coder:
      type: doer
      display-name: "Coder"
      description: "Implements code changes in isolated worktrees"
      timeouts:
        execution: 2h
        poll-interval: 30s
        max-wait: 30m
      allowed-operations:
        - write-checkpoint
        - submit-for-review
        - mark-blocked
        - handoff
        - set-task-output
      skills:
        - debugging
        - testing
        - clean-code
      mandatory-docs: []

    code-reviewer:
      type: reviewer
      display-name: "Code Reviewer"
      description: "Reviews code changes, issues binding verdicts"
      timeouts:
        execution: 30m
        poll-interval: 30s
        max-wait: 30m
      allowed-operations:
        - submit-verdict
      skills:
        - code-review
        - systemic-thinking
        - software-architecture-review
      mandatory-docs: []

  role-pairs:
    epic-planning-pair:
      doer: epic-planner
      reviewer: epic-plan-reviewer
      states:
        initial: DRAFT_EPIC_PLAN
        executing: EPIC_PLANNING
        submitted: EPIC_PLAN_TO_REVIEW
        reviewing: REVIEWING_EPIC_PLAN
        approved: EPIC_PLAN_APPROVED
        rejected: EPIC_PLAN_REJECTED

    us-writing-pair:
      doer: us-writer
      reviewer: us-reviewer
      states:
        initial: DRAFT_US
        executing: WRITING_US
        submitted: US_READY_FOR_REVIEW
        reviewing: REVIEWING_US
        approved: US_APPROVED
        rejected: US_REJECTED

    code-planning-pair:
      doer: code-planner
      reviewer: code-plan-reviewer
      states:
        initial: DRAFT_CODING_PLAN
        executing: CODE_PLANNING
        submitted: CODING_PLAN_TO_REVIEW
        reviewing: REVIEWING_CODING_PLAN
        approved: CODING_PLAN_APPROVED
        rejected: CODING_PLAN_REJECTED

    coding-pair:
      doer: coder
      reviewer: code-reviewer
      states:
        initial: DRAFT_CODE
        executing: IMPLEMENTING_CODE
        submitted: CODE_READY_FOR_REVIEW
        reviewing: REVIEWING_CODE
        approved: CODE_APPROVED
        rejected: CODE_REJECTED

  sub-pipelines:
    epic-spec-subpipeline:
      steps:
        - epic-planning-pair
        - us-writing-pair
      transitions:
        - name: epic-to-us
          from: epic-planning-pair.approved
          to: us-writing-pair.initial
          trigger: manual  # human validates epic decomposition
          cardinality: per-subtask  # supervisor creates one downstream task per entry in output[]

    coding-subpipeline:
      steps:
        - code-planning-pair
        - coding-pair
      transitions:
        - name: code-plan-to-coding
          from: code-planning-pair.approved
          to: coding-pair.initial
          trigger: manual  # human validates implementation plan before coding begins
          cardinality: per-subtask  # supervisor creates one downstream task per entry in output[]

  pipeline-transitions:
    - name: us-to-coding
      from: epic-spec-subpipeline.us-writing-pair.approved
      to: coding-subpipeline.code-planning-pair.initial
      trigger: manual
      cardinality: one-to-one  # approved task itself is the input, no output[] needed

  # Orchestrator is implicit — mandatory, unique, not part of any pipeline.
  # It reads entry-points below to classify input and dispatch to the right sub-pipeline.
  entry-points:
    general-objective: epic-spec-subpipeline.epic-planning-pair
    detailed-spec: coding-subpipeline.code-planning-pair
