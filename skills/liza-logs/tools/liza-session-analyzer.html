<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liza Session Analyzer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', -apple-system, sans-serif; }
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

// --- Parsers ---

function measureSparseItem(item) {
  const t = item.type;
  if (t === "command_execution") return (item.aggregated_output || "").length;
  if (t === "reasoning" || t === "agent_message") return (item.text || "").length;
  if (t === "file_change") return JSON.stringify(item.changes || []).length;
  if (t === "mcp_tool_call") {
    const args = typeof item.arguments === "object" ? JSON.stringify(item.arguments) : String(item.arguments || "");
    const result = typeof item.result === "object" ? JSON.stringify(item.result) : String(item.result || "");
    return args.length + result.length;
  }
  return 0;
}

function parseCoderLog(lines) {
  const items = [];
  let usage = null;
  let threadId = null;
  for (const line of lines) {
    try {
      const obj = JSON.parse(line);
      if (obj.type === "thread.started") threadId = obj.thread_id;
      if (obj.type === "turn.completed" && obj.usage) usage = obj.usage;
      if (obj.type === "item.completed" && obj.item) {
        const it = obj.item;
        const output = it.aggregated_output || "";
        items.push({
          id: it.id, type: it.type,
          status: it.status || "completed",
          command: it.command || null, text: it.text || null,
          outputLen: output.length,
          outputPreview: output.slice(0, 120).replace(/\n/g, " "),
          chars: measureSparseItem(it),
          exitCode: it.exit_code,
          server: it.server || null, tool: it.tool || null,
          arguments: it.arguments || null,
          changes: it.changes || null,
          result: it.result || null,
        });
      }
    } catch {}
  }
  const byId = {};
  for (const item of items) { if (!byId[item.id] || item.status === "completed") byId[item.id] = item; }
  const dedupedItems = Object.values(byId).sort((a, b) => parseInt(a.id.replace("item_","")) - parseInt(b.id.replace("item_","")));
  return { format: "codex", threadId, items: dedupedItems, usage };
}

function measureRichBlock(block) {
  if (block.type === "thinking") return (block.thinking || "").length;
  if (block.type === "text") return (block.text || "").length;
  if (block.type === "tool_use") return JSON.stringify(block.input || {}).length;
  return 0;
}

function measureToolResult(content) {
  if (typeof content === "string") return content.length;
  if (Array.isArray(content)) return content.reduce((s, p) => s + (typeof p === "string" ? p.length : (p?.text || "").length), 0);
  return 0;
}

function parseOrchestratorLog(lines) {
  const events = [];
  let systemInfo = null;
  let resultInfo = null;
  const seenMsgIds = new Set();
  const perMsgUsage = [];
  for (const line of lines) {
    try {
      const obj = JSON.parse(line);
      if (obj.type === "system") {
        systemInfo = { model: obj.model, sessionId: obj.session_id, tools: obj.tools?.length || 0,
          mcpServers: obj.mcp_servers || [], skills: obj.skills?.length || 0, plugins: obj.plugins || [] };
      }
      if (obj.type === "assistant" && obj.message) {
        const msg = obj.message;
        // Dedup usage by message.id
        if (msg.id && !seenMsgIds.has(msg.id)) {
          seenMsgIds.add(msg.id);
          if (msg.usage) {
            perMsgUsage.push({
              msgId: msg.id,
              inputTokens: msg.usage.input_tokens || 0,
              cacheCreation: msg.usage.cache_creation_input_tokens || 0,
              cacheRead: msg.usage.cache_read_input_tokens || 0,
              outputTokens: msg.usage.output_tokens || 0,
            });
          }
        }
        // Process ALL content blocks, not just the first
        for (const block of (msg.content || [])) {
          events.push({ type: "assistant", contentType: block.type, toolName: block.name || null,
            toolInput: block.input || null, toolUseId: block.id || null,
            text: block.text || block.thinking || null,
            chars: measureRichBlock(block),
            usage: msg.usage || null, msgId: msg.id });
        }
      }
      if (obj.type === "user") {
        if (obj.tool_use_result !== undefined) {
          const resultChars = Array.isArray(obj.tool_use_result)
            ? obj.tool_use_result.reduce((s, p) => s + (p?.text || "").length, 0)
            : measureToolResult(obj.tool_use_result);
          events.push({ type: "tool_result", result: obj.tool_use_result, chars: resultChars });
        }
        // Also measure nested tool_result content with correlation IDs
        for (const part of (obj.message?.content || [])) {
          if (part?.type === "tool_result") {
            const nested = measureToolResult(part.content);
            const preview = typeof part.content === "string" ? part.content.slice(0, 120).replace(/\n/g, " ") :
              Array.isArray(part.content) ? (part.content[0]?.text || "").slice(0, 120).replace(/\n/g, " ") : "";
            if (nested > 0) events.push({
              type: "tool_result", result: part.content, chars: nested,
              toolUseId: part.tool_use_id || null, isError: !!part.is_error, preview
            });
          } else if (part?.content) {
            const nested = measureToolResult(part.content);
            if (nested > 0) events.push({ type: "tool_result", result: part.content, chars: nested });
          }
        }
      }
      if (obj.type === "result") {
        resultInfo = { success: !obj.is_error, durationMs: obj.duration_ms, durationApiMs: obj.duration_api_ms,
          numTurns: obj.num_turns, totalCostUsd: obj.total_cost_usd, usage: obj.usage, modelUsage: obj.modelUsage };
      }
      if (obj.type === "rate_limit_event") { events.push({ type: "rate_limit", info: obj.rate_limit_info }); }
    } catch {}
  }
  return { format: "claude_code", systemInfo, events, resultInfo, perMsgUsage };
}

function detectAndParse(text) {
  const lines = text.trim().split("\n").filter(Boolean);
  if (!lines.length) return null;
  try {
    const first = JSON.parse(lines[0]);
    if (first.type === "thread.started" || first.type === "turn.started") return parseCoderLog(lines);
    if (first.type === "system" || first.type === "assistant") return parseOrchestratorLog(lines);
  } catch {}
  const coder = parseCoderLog(lines);
  if (coder.items.length > 0) return coder;
  const orchestrator = parseOrchestratorLog(lines);
  if (orchestrator.events.length > 0) return orchestrator;
  return null;
}

// Commands where exit code 1 means "no matches/differences found", not an error.
const BENIGN_EXIT1_COMMANDS = new Set(["rg", "grep", "egrep", "fgrep", "ag", "ack", "diff"]);

function isBenignExit(cmdName, exitCode) {
  return exitCode === 1 && BENIGN_EXIT1_COMMANDS.has(cmdName);
}

function extractCommandName(cmd) {
  if (!cmd) return cmd;
  const prefixes = ["/usr/bin/zsh -lc ", "/bin/bash -lc ", "/bin/sh -c "];
  for (const prefix of prefixes) {
    if (cmd.startsWith(prefix)) {
      const inner = cmd.slice(prefix.length).trim().replace(/^['"]|['"]$/g, "");
      let first = (inner.split(/\s+/)[0] || cmd);
      if (["set", "echo", "if", "cd"].includes(first)) {
        const parts = inner.split("&&");
        if (parts.length > 1) first = parts[parts.length - 1].trim().split(/\s+/)[0];
      }
      return first;
    }
  }
  return cmd.split(/\s+/)[0] || cmd;
}

function extractCommandDetail(cmd) {
  if (!cmd) return "";
  const prefixes = ["/usr/bin/zsh -lc ", "/bin/bash -lc ", "/bin/sh -c "];
  for (const prefix of prefixes) {
    if (cmd.startsWith(prefix)) {
      return cmd.slice(prefix.length).trim().replace(/^['"]|['"]$/g, "").slice(0, 80);
    }
  }
  return cmd.slice(0, 80);
}

function extractToolDetail(name, input) {
  if (!input) return "";
  if (name === "Bash") return (input.command || "").split("\n")[0].slice(0, 80);
  if (name === "Read" || name === "Write" || name === "Edit") return (input.file_path || "").slice(0, 80);
  if (name === "Glob" || name === "Grep") {
    const pat = input.pattern || "";
    const path = input.path || "";
    return path ? `${pat} in ${path}` : pat;
  }
  if (name === "Skill") return (input.skill || "").slice(0, 80);
  if (name === "Task") return (input.description || "").slice(0, 80);
  if (name === "TaskCreate") return (input.subject || "").slice(0, 80);
  if (name === "TaskUpdate") return `#${input.taskId || ""} → ${input.status || ""}`;
  // MCP or fallback: first string value
  for (const v of Object.values(input)) {
    if (typeof v === "string" && v) return v.slice(0, 60);
  }
  return "";
}

function findStruggleSequences(timeline) {
  const sequences = [];
  let i = 0;
  const n = timeline.length;
  while (i < n) {
    if (!timeline[i].isError) { i++; continue; }
    let start = i, lastErr = i, errCount = 1, j = i + 1;
    while (j < n) {
      if (timeline[j].isError) { lastErr = j; errCount++; j++; }
      else if (j - lastErr <= 3) { j++; }
      else { break; }
    }
    let end = lastErr;
    if (end + 1 < n && !timeline[end + 1].isError) end++;
    const span = timeline.slice(start, end + 1);
    if (errCount >= 2) {
      const turnNums = [...new Set(span.map(a => a.turnNum).filter(t => t > 0))].sort((a,b)=>a-b);
      const toolAttempts = {};
      for (const a of span) toolAttempts[a.toolName] = (toolAttempts[a.toolName] || 0) + 1;
      const firstErr = span.find(a => a.isError);
      sequences.push({
        startAction: start + 1, endAction: end + 1,
        totalActions: span.length, errorCount: errCount,
        numTurns: turnNums.length,
        toolAttempts,
        rootHint: (firstErr.preview || firstErr.detail || "").slice(0, 80),
      });
    }
    i = end + 1;
  }
  return sequences;
}

const SKILL_PATH_RE = /skills\/([a-z][a-z0-9_-]*)\/SKILL\.md$/;
function extractSkillFromPath(path) {
  if (!path) return null;
  const m = path.match(SKILL_PATH_RE);
  return m ? m[1] : null;
}

function extractSecretWordsLines(text) {
  if (!text) return [];
  const lines = text.trim().split("\n").slice(0, 30);
  return lines.map(l => l.trim().replace(/^[*_#]+\s*/, "").replace(/[*_#]+$/, "").trim()).filter(l => l.startsWith("Liza") || l.startsWith("Secret"));
}

function parseSecretWords(line) {
  if (!line) return [];
  const stripped = line.replace(/^Secret\s+words?:\s*/i, "");
  const words = [];
  for (const token of stripped.split(/\s+/)) {
    const clean = token.replace(/[.,;:!?]+$/, "");
    if (!clean) continue;
    if ((clean[0] === clean[0].toUpperCase() && clean[0] !== clean[0].toLowerCase()) || clean.includes("-")) {
      words.push(clean);
    } else {
      break;
    }
  }
  return words;
}

// --- Analysis ---

function analyzeCodex(parsed) {
  const { items, usage } = parsed;
  const totalInput = usage?.input_tokens || 0;
  const cachedInput = usage?.cached_input_tokens || 0;
  const freshInput = totalInput - cachedInput;
  const output = usage?.output_tokens || 0;
  const itemsByType = {};
  let totalCharsAll = 0;
  for (const item of items) {
    const t = item.type;
    if (!itemsByType[t]) itemsByType[t] = { count: 0, chars: 0 };
    itemsByType[t].count++;
    itemsByType[t].chars += item.chars || 0;
    totalCharsAll += item.chars || 0;
  }
  let topItems = items.filter(i => i.chars > 0).sort((a, b) => b.chars - a.chars).slice(0, 15)
    .map(i => ({
      type: i.type, chars: i.chars, estTokens: Math.ceil(i.chars / 4),
      preview: truncate(i.command || i.text || (i.server ? `${i.server}/${i.tool}` : "") || "", 80),
    }));
  // --- Timeline from actionable items ---
  const timeline = [];
  for (const item of items) {
    if (item.type === "command_execution") {
      const cmdName = extractCommandName(item.command);
      const exitCode = item.exitCode;
      timeline.push({
        turnNum: 1, toolName: cmdName,
        detail: extractCommandDetail(item.command),
        resultChars: item.outputLen || 0,
        isError: exitCode != null && exitCode !== 0 && !isBenignExit(cmdName, exitCode),
        preview: item.outputPreview || "",
      });
    } else if (item.type === "mcp_tool_call") {
      const name = item.server ? `${item.server}/${item.tool}` : item.tool || "mcp";
      let detail = "";
      if (item.arguments && typeof item.arguments === "object") {
        for (const v of Object.values(item.arguments)) {
          if (typeof v === "string" && v) { detail = v.slice(0, 80); break; }
        }
      }
      const resultText = item.result ? JSON.stringify(item.result) : "";
      timeline.push({
        turnNum: 1, toolName: name, detail,
        resultChars: resultText.length,
        isError: item.status === "failed",
        preview: resultText.slice(0, 120).replace(/\n/g, " "),
      });
    } else if (item.type === "file_change" && item.changes) {
      const paths = item.changes.map(c => (c.path || "").split("/").pop());
      timeline.push({
        turnNum: 1, toolName: "file_change",
        detail: paths.join(", ").slice(0, 80),
        resultChars: 0, isError: false, preview: "",
      });
    }
  }

  // --- Skill Invocations (sparse: detect read_text_file of SKILL.md) ---
  const skillInvocations = {};
  for (const item of items) {
    if (item.type === "mcp_tool_call" && (item.tool === "read_text_file" || item.tool === "read_file")) {
      const path = item.arguments?.path || "";
      const skill = extractSkillFromPath(path);
      if (skill) skillInvocations[skill] = (skillInvocations[skill] || 0) + 1;
    }
  }

  // --- Secret Words (early agent_message text blocks) ---
  let secretWordsLines = [];
  let swBlockCount = 0;
  for (const item of items) {
    if (item.type === "agent_message" && item.text) {
      const found = extractSecretWordsLines(item.text);
      if (found.length > 0) { secretWordsLines = found; break; }
      if (++swBlockCount >= 5) break;
    }
  }

  // --- Tool Result Breakdown ---
  const toolResultBreakdown = {};
  for (const t of timeline) {
    if (!toolResultBreakdown[t.toolName]) toolResultBreakdown[t.toolName] = { calls: 0, totalChars: 0, maxChars: 0 };
    const b = toolResultBreakdown[t.toolName];
    b.calls++; b.totalChars += t.resultChars; b.maxChars = Math.max(b.maxChars, t.resultChars);
  }

  // --- Efficiency Insights ---
  const efficiencyInsights = [];
  const errorActions = timeline.filter(t => t.isError);
  if (errorActions.length > 0) {
    const toolErrs = {};
    for (const e of errorActions) toolErrs[e.toolName] = (toolErrs[e.toolName] || 0) + 1;
    const bd = Object.entries(toolErrs).sort((a,b) => b[1]-a[1]).map(([t,n]) => `${n}×${t}`).join(", ");
    efficiencyInsights.push({ type: "error", text: `${errorActions.length} error(s): ${bd}` });
  }
  const previewMap = {};
  for (const t of timeline) {
    if (t.resultChars >= 1024 && t.preview) {
      const key = t.preview.slice(0, 100);
      if (!previewMap[key]) previewMap[key] = [];
      previewMap[key].push(t);
    }
  }
  let dupeWaste = 0;
  const dupeEntries = [];
  for (const [key, group] of Object.entries(previewMap)) {
    if (group.length >= 2) {
      dupeWaste += group.slice(1).reduce((s, t) => s + t.resultChars, 0);
      dupeEntries.push({ count: group.length, tool: group[0].toolName, preview: key.slice(0, 60) });
    }
  }
  if (dupeEntries.length > 0) {
    efficiencyInsights.push({ type: "duplicate", text: `${dupeEntries.length} near-duplicate result(s) (~${(dupeWaste/1024).toFixed(0)}KB wasted)`, details: dupeEntries.slice(0, 3) });
  }
  for (const [name, b] of Object.entries(toolResultBreakdown)) {
    if (b.calls >= 5 && (b.totalChars / b.calls) < 200) {
      efficiencyInsights.push({ type: "low_value", text: `${name} called ${b.calls}× with avg result ${Math.round(b.totalChars/b.calls)} chars (low-value chatter?)` });
    }
  }

  return {
    summary: { totalInputTokens: totalInput, cachedInputTokens: cachedInput, freshInputTokens: freshInput,
      outputTokens: output, cacheHitRate: totalInput > 0 ? ((cachedInput / totalInput) * 100).toFixed(1) : "0",
      totalItems: items.length },
    breakdown: itemsByType, totalCharsAll, topItems,
    timeline, toolResultBreakdown, efficiencyInsights,
    struggleSequences: findStruggleSequences(timeline),
    skillInvocations,
    secretWordsLines,
  };
}

function analyzeClaudeCode(parsed) {
  const { systemInfo, events, resultInfo, perMsgUsage } = parsed;
  const turns = [];
  let currentTurn = null;
  for (const ev of events) {
    if (ev.type === "assistant") {
      if (!currentTurn || (currentTurn.results.length > 0 && ev.contentType !== "text")) {
        if (currentTurn) turns.push(currentTurn);
        currentTurn = { actions: [], results: [], usage: ev.usage };
      }
      currentTurn.actions.push(ev);
      if (ev.usage) currentTurn.usage = ev.usage;
    } else if (ev.type === "tool_result" && currentTurn) { currentTurn.results.push(ev); }
  }
  if (currentTurn) turns.push(currentTurn);

  const totalUsage = resultInfo?.usage || {};
  const modelUsage = resultInfo?.modelUsage || {};
  const cacheCreation = totalUsage.cache_creation_input_tokens || 0;
  const cacheRead = totalUsage.cache_read_input_tokens || 0;
  const plainInput = totalUsage.input_tokens || 0;
  const totalContextTokens = plainInput + cacheCreation + cacheRead;
  const outputTokens = totalUsage.output_tokens || 0;
  const mcpStatus = systemInfo?.mcpServers?.map(s => ({ name: s.name, status: s.status })) || [];

  // Content breakdown with chars
  const contentByType = {};
  let totalCharsAll = 0;
  for (const ev of events) {
    const ct = ev.contentType || ev.type;
    const chars = ev.chars || 0;
    if (!contentByType[ct]) contentByType[ct] = { count: 0, chars: 0 };
    contentByType[ct].count++;
    contentByType[ct].chars += chars;
    totalCharsAll += chars;
  }

  // --- Feature 1: Turn Timeline ---
  // Build a map of msgId → turn number using perMsgUsage index
  const msgIdToTurn = {};
  perMsgUsage.forEach((u, i) => { msgIdToTurn[u.msgId] = i + 1; });

  // Collect pending tool_use events, then match with tool_result events
  const pendingToolUses = {}; // toolUseId → { name, detail, turnNum }
  const timeline = [];
  for (const ev of events) {
    if (ev.type === "assistant" && ev.contentType === "tool_use" && ev.toolUseId) {
      pendingToolUses[ev.toolUseId] = {
        name: ev.toolName || "unknown",
        detail: extractToolDetail(ev.toolName || "", ev.toolInput),
        turnNum: msgIdToTurn[ev.msgId] || 0,
      };
    }
    if (ev.type === "tool_result" && ev.toolUseId && pendingToolUses[ev.toolUseId]) {
      const pending = pendingToolUses[ev.toolUseId];
      // For Bash commands, check if exit code 1 is benign (rg/grep no matches)
      let effectiveError = !!ev.isError;
      if (effectiveError && pending.name === "Bash" && pending.detail) {
        const bashCmd = pending.detail.trim().split(/\s+/)[0].split("/").pop();
        if (BENIGN_EXIT1_COMMANDS.has(bashCmd) && !(ev.preview || "").trim()) {
          effectiveError = false;
        }
      }
      timeline.push({
        turnNum: pending.turnNum,
        toolName: pending.name,
        detail: pending.detail,
        resultChars: ev.chars || 0,
        isError: effectiveError,
        preview: ev.preview || "",
      });
      delete pendingToolUses[ev.toolUseId];
    }
  }

  // --- Feature 2: Tool Result Breakdown ---
  const toolResultBreakdown = {};
  for (const t of timeline) {
    if (!toolResultBreakdown[t.toolName]) {
      toolResultBreakdown[t.toolName] = { calls: 0, totalChars: 0, maxChars: 0 };
    }
    const b = toolResultBreakdown[t.toolName];
    b.calls++;
    b.totalChars += t.resultChars;
    b.maxChars = Math.max(b.maxChars, t.resultChars);
  }

  // --- Feature 3: Efficiency Insights ---
  const efficiencyInsights = [];
  // 3a. Errors
  const errorActions = timeline.filter(t => t.isError);
  if (errorActions.length > 0) {
    const toolErrs = {};
    for (const e of errorActions) toolErrs[e.toolName] = (toolErrs[e.toolName] || 0) + 1;
    const breakdown2 = Object.entries(toolErrs).sort((a,b) => b[1]-a[1]).map(([t,n]) => `${n}×${t}`).join(", ");
    efficiencyInsights.push({ type: "error", text: `${errorActions.length} error(s): ${breakdown2}` });
  }
  // 3b. Near-duplicates (>1KB, same first 100 chars of preview)
  const previewMap = {};
  for (const t of timeline) {
    if (t.resultChars >= 1024 && t.preview) {
      const key = t.preview.slice(0, 100);
      if (!previewMap[key]) previewMap[key] = [];
      previewMap[key].push(t);
    }
  }
  let dupeWaste = 0;
  const dupeEntries = [];
  for (const [key, group] of Object.entries(previewMap)) {
    if (group.length >= 2) {
      const waste = group.slice(1).reduce((s, t) => s + t.resultChars, 0);
      dupeWaste += waste;
      dupeEntries.push({ count: group.length, tool: group[0].toolName, preview: key.slice(0, 60) });
    }
  }
  if (dupeEntries.length > 0) {
    efficiencyInsights.push({ type: "duplicate", text: `${dupeEntries.length} near-duplicate result(s) (~${(dupeWaste/1024).toFixed(0)}KB wasted)`, details: dupeEntries.slice(0, 3) });
  }
  // 3c. Repetitive low-value (same tool 5+ times, avg <200 chars)
  for (const [name, b] of Object.entries(toolResultBreakdown)) {
    if (b.calls >= 5 && (b.totalChars / b.calls) < 200) {
      efficiencyInsights.push({ type: "low_value", text: `${name} called ${b.calls}× with avg result ${Math.round(b.totalChars/b.calls)} chars (low-value chatter?)` });
    }
  }

  // --- Feature 4: System Prompt Cost Multiplier ---
  let systemPromptEstimate = null;
  if (perMsgUsage.length > 0) {
    const first = perMsgUsage[0];
    const sysTokens = first.cacheCreation + first.cacheRead;
    if (sysTokens > 0) {
      const numTurns = perMsgUsage.length;
      const wastedTurns = errorActions.length;
      systemPromptEstimate = {
        tokensPerTurn: sysTokens,
        totalTurns: numTurns,
        totalReplayTokens: sysTokens * numTurns,
        wastedTurns,
        wastedTokens: sysTokens * wastedTurns,
      };
    }
  }

  // --- Skill Invocations (Skill tool or direct read of SKILL.md) ---
  const skillInvocations = {};
  for (const ev of events) {
    if (ev.type === "assistant" && ev.contentType === "tool_use") {
      if (ev.toolName === "Skill" && ev.toolInput?.skill) {
        const skill = ev.toolInput.skill;
        skillInvocations[skill] = (skillInvocations[skill] || 0) + 1;
      } else if (ev.toolName === "Read" || ev.toolName === "mcp__filesystem__read_text_file" || ev.toolName === "mcp__filesystem__read_file") {
        const path = ev.toolInput?.file_path || ev.toolInput?.path || "";
        const skill = extractSkillFromPath(path);
        if (skill) skillInvocations[skill] = (skillInvocations[skill] || 0) + 1;
      }
    }
  }

  // --- Secret Words (early assistant text blocks, not thinking) ---
  let secretWordsLines = [];
  let swBlockCount = 0;
  for (const ev of events) {
    if (ev.type === "assistant" && ev.contentType === "text" && ev.text) {
      const found = extractSecretWordsLines(ev.text);
      if (found.length > 0) { secretWordsLines = found; break; }
      if (++swBlockCount >= 5) break;
    }
  }

  return {
    summary: { model: Object.keys(modelUsage)[0] || systemInfo?.model || "unknown",
      totalCostUsd: resultInfo?.totalCostUsd || 0, durationMs: resultInfo?.durationMs || 0,
      durationApiMs: resultInfo?.durationApiMs || 0, numTurns: resultInfo?.numTurns || turns.length,
      plainInputTokens: plainInput, cacheCreationTokens: cacheCreation, cacheReadTokens: cacheRead,
      totalContextTokens, outputTokens,
      cacheHitRate: totalContextTokens > 0 ? ((cacheRead / totalContextTokens) * 100).toFixed(1) : "0",
      contextWindow: Object.values(modelUsage)[0]?.contextWindow || null,
      contextUtilization: Object.values(modelUsage)[0]?.contextWindow
        ? ((totalContextTokens / Object.values(modelUsage)[0].contextWindow) * 100).toFixed(1) : null,
      peakFillPct: (() => {
        const cw = Object.values(modelUsage)[0]?.contextWindow;
        if (!cw || !perMsgUsage?.length) return null;
        const maxIn = Math.max(...perMsgUsage.map(u => u.inputTokens + u.cacheCreation + u.cacheRead));
        return ((maxIn / cw) * 100).toFixed(1);
      })() },
    turns, mcpStatus, toolsAvailable: systemInfo?.tools || 0, skillsAvailable: systemInfo?.skills || 0,
    perMsgUsage: perMsgUsage || [], contentByType, totalCharsAll,
    timeline, toolResultBreakdown, efficiencyInsights, systemPromptEstimate,
    struggleSequences: findStruggleSequences(timeline),
    skillInvocations,
    secretWordsLines,
  };
}

// --- Helpers ---

function truncate(s, n) { if (!s) return ""; return s.length > n ? s.slice(0, n) + "…" : s; }
function formatTokens(n) { if (n == null) return "—"; if (n >= 1e6) return (n/1e6).toFixed(2)+"M"; if (n >= 1e3) return (n/1e3).toFixed(1)+"K"; return String(n); }
function formatDuration(ms) { if (!ms) return "—"; if (ms < 1000) return ms+"ms"; const s = ms/1000; if (s < 60) return s.toFixed(1)+"s"; return Math.floor(s/60)+"m "+(s%60).toFixed(0)+"s"; }
function formatCost(usd) { if (!usd) return "—"; return "$"+usd.toFixed(4); }

const C = { bg:"#0d1117", surface:"#161b22", surfaceHover:"#1c2333", border:"#30363d", borderAccent:"#3d444d",
  text:"#e6edf3", textMuted:"#8b949e", textDim:"#656d76", accent:"#58a6ff", accentDim:"#1f6feb33",
  green:"#3fb950", greenDim:"#238636", orange:"#d29922", red:"#f85149", purple:"#bc8cff", cyan:"#39d2c0", pink:"#f778ba" };

// --- Components ---

function StatCard({ label, value, sub, color = C.accent }) {
  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "14px 18px", minWidth: 140, flex: "1 1 140px" }}>
      <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1.2, color: C.textDim, marginBottom: 6, fontFamily: "monospace" }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 700, color, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.1 }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function SectionTitle({ children }) {
  return <h3 style={{ fontSize: 13, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1.5, color: C.textMuted,
    margin: "28px 0 12px", paddingBottom: 8, borderBottom: `1px solid ${C.border}`, fontFamily: "monospace" }}>{children}</h3>;
}

function ContextBar({ segments, total }) {
  return (
    <div>
      <div style={{ display: "flex", height: 28, borderRadius: 6, overflow: "hidden", border: `1px solid ${C.border}` }}>
        {segments.map((seg, i) => {
          const pct = total > 0 ? (seg.value / total) * 100 : 0;
          if (pct < 0.3) return null;
          return <div key={i} title={`${seg.label}: ${formatTokens(seg.value)} (${pct.toFixed(1)}%)`}
            style={{ width: `${pct}%`, background: seg.color, display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 10, fontWeight: 600, color: "#fff", fontFamily: "monospace", overflow: "hidden", whiteSpace: "nowrap", transition: "width 0.3s ease" }}>
            {pct > 8 ? `${pct.toFixed(0)}%` : ""}
          </div>;
        })}
      </div>
      <div style={{ display: "flex", gap: 16, marginTop: 8, flexWrap: "wrap" }}>
        {segments.map((seg, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: C.textMuted }}>
            <div style={{ width: 10, height: 10, borderRadius: 2, background: seg.color }} />
            <span>{seg.label}: <strong style={{ color: C.text }}>{formatTokens(seg.value)}</strong></span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Table({ columns, rows }) {
  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: "'JetBrains Mono', monospace" }}>
        <thead><tr>
          {columns.map((col, i) => (
            <th key={i} style={{ textAlign: col.align || "left", padding: "8px 12px", borderBottom: `2px solid ${C.border}`,
              color: C.textMuted, fontWeight: 600, fontSize: 10, textTransform: "uppercase", letterSpacing: 1, whiteSpace: "nowrap" }}>{col.label}</th>
          ))}
        </tr></thead>
        <tbody>
          {rows.map((row, ri) => (
            <tr key={ri} style={{ borderBottom: `1px solid ${C.border}` }}>
              {columns.map((col, ci) => (
                <td key={ci} style={{ padding: "7px 12px", textAlign: col.align || "left", color: C.text,
                  maxWidth: col.maxWidth || "auto", overflow: "hidden", textOverflow: "ellipsis",
                  whiteSpace: col.wrap ? "normal" : "nowrap" }}>
                  {col.render ? col.render(row) : row[col.key]}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

          { label: "Tool", key: "tool" },
          { label: "Calls", key: "calls", align: "right" },
          { label: "Total", key: "total", align: "right" },
          { label: "Avg", key: "avg", align: "right" },
          { label: "Max", key: "max", align: "right" },
        ]} rows={Object.entries(toolResultBreakdown)
          .sort((a,b) => b[1].totalChars - a[1].totalChars)
          .map(([tool, b]) => ({
            tool, calls: b.calls,
            total: b.totalChars >= 1024 ? `${(b.totalChars/1024).toFixed(1)}KB` : `${b.totalChars}`,
            avg: `${Math.round(b.totalChars / b.calls)}`,
            max: b.maxChars >= 1024 ? `${(b.maxChars/1024).toFixed(1)}KB` : `${b.maxChars}`,
          }))} />
      </>)}

      {efficiencyInsights.length > 0 && (<>
        <SectionTitle>Efficiency Insights</SectionTitle>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {efficiencyInsights.map((ins, i) => {
            const colors = { error: { bg: "#f8514922", border: C.red, icon: "\u{1F534}" },
              duplicate: { bg: "#d2992222", border: C.orange, icon: "\u{1F7E0}" },
              low_value: { bg: "#58a6ff22", border: C.accent, icon: "\u{1F535}" } };
            const c = colors[ins.type] || colors.low_value;
            return (
              <div key={i} style={{ background: c.bg, border: `1px solid ${c.border}33`, borderRadius: 6,
                padding: "10px 14px", fontSize: 12, fontFamily: "'JetBrains Mono', monospace" }}>
                <div style={{ color: c.border, fontWeight: 600 }}>{c.icon} {ins.text}</div>
                {ins.details && ins.details.map((d, j) => (
                  <div key={j} style={{ color: C.textMuted, fontSize: 11, marginTop: 4, paddingLeft: 20 }}>
                    {d.count}× {d.tool}: {d.preview}...
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </>)}

      {systemPromptEstimate && (<>
        <SectionTitle>System Prompt Cost Multiplier</SectionTitle>
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 24px", fontSize: 12,
            fontFamily: "'JetBrains Mono', monospace" }}>
            <div style={{ color: C.textMuted }}>Sys prompt size:</div>
            <div style={{ color: C.text }}>{formatTokens(systemPromptEstimate.tokensPerTurn)} tokens/turn</div>
            <div style={{ color: C.textMuted }}>Total replay:</div>
            <div style={{ color: C.text }}>{formatTokens(systemPromptEstimate.tokensPerTurn)} × {systemPromptEstimate.totalTurns} turns = {formatTokens(systemPromptEstimate.totalReplayTokens)}</div>
            {systemPromptEstimate.wastedTurns > 0 && <>
              <div style={{ color: C.textMuted }}>Wasted on errors:</div>
              <div style={{ color: C.red }}>{systemPromptEstimate.wastedTurns} turn(s) × {formatTokens(systemPromptEstimate.tokensPerTurn)} = {formatTokens(systemPromptEstimate.wastedTokens)} wasted</div>
            </>}
          </div>
        </div>
      </>)}

      {struggleSequences.length > 0 && (<>
        <SectionTitle>Struggle Sequences</SectionTitle>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {struggleSequences.map((seq, i) => {
            const replayCost = systemPromptEstimate ? systemPromptEstimate.tokensPerTurn * seq.numTurns : 0;
            return (
              <div key={i} style={{ background: "#f8514911", border: `1px solid ${C.red}22`, borderRadius: 8,
                padding: 16, fontFamily: "'JetBrains Mono', monospace", fontSize: 12 }}>
                <div style={{ color: C.red, fontWeight: 700, marginBottom: 8 }}>
                  #{seq.startAction}–#{seq.endAction} ({seq.totalActions} actions, {seq.errorCount} errors, {seq.numTurns} turns)
                </div>
                {seq.rootHint && <div style={{ color: C.textMuted, fontSize: 11, marginBottom: 4 }}>
                  <span style={{ color: C.textDim }}>Root: </span>{truncate(seq.rootHint, 70)}
                </div>}
                <div style={{ color: C.textMuted, fontSize: 11, marginBottom: 4 }}>
                  <span style={{ color: C.textDim }}>Retries: </span>
                  {Object.entries(seq.toolAttempts).sort((a,b) => b[1]-a[1]).map(([t,n]) => `${n}×${t}`).join(", ")}
                </div>
                {replayCost > 0 && <div style={{ color: C.orange, fontSize: 11 }}>
                  <span style={{ color: C.textDim }}>Replay cost: </span>
                  {seq.numTurns} turns × {formatTokens(systemPromptEstimate.tokensPerTurn)} = {formatTokens(replayCost)} cache-read tokens
                </div>}
              </div>
            );
          })}
        </div>
      </>)}

      {mcpStatus.length > 0 && (<>
        <SectionTitle>MCP Servers</SectionTitle>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {mcpStatus.map((s, i) => (
            <span key={i} style={{ padding: "4px 10px", borderRadius: 4, fontSize: 11, fontFamily: "monospace",
              background: s.status === "connected" ? C.greenDim : s.status === "failed" ? "#f8514922" : C.accentDim,
              color: s.status === "connected" ? C.green : s.status === "failed" ? C.red : C.orange,
              border: `1px solid ${(s.status === "connected" ? C.green : s.status === "failed" ? C.red : C.orange) + "33"}` }}>
              {s.name}: {s.status}
            </span>
          ))}
        </div>
      </>)}
    </div>
  );
}

function App() {
  const [files, setFiles] = useState([]);
  const [dragOver, setDragOver] = useState(false);

  const handleFiles = useCallback((fileList) => {
    const readers = Array.from(fileList).map(f => new Promise(res => {
      const reader = new FileReader();
      reader.onload = () => res({ name: f.name, text: reader.result });
      reader.readAsText(f);
    }));
    Promise.all(readers).then(results => {
      setFiles(prev => [...prev, ...results.map(r => ({ name: r.name, parsed: detectAndParse(r.text) }))]);
    });
  }, []);

  const handleDrop = useCallback((e) => { e.preventDefault(); setDragOver(false); if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); }, [handleFiles]);

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'Segoe UI', -apple-system, sans-serif", padding: "24px 20px" }}>
      <div style={{ maxWidth: 900, margin: "0 auto" }}>
        <div style={{ marginBottom: 28 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
            <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, margin: 0, fontFamily: "'JetBrains Mono', monospace" }}>
              <span style={{ color: C.cyan }}>liza</span><span style={{ color: C.textDim }}>::</span>session_analyzer
            </h1>
            <span style={{ fontSize: 11, color: C.textDim, fontFamily: "monospace" }}>v0.1</span>
          </div>
          <p style={{ fontSize: 12, color: C.textMuted, margin: "6px 0 0" }}>Drop agent session JSON logs to analyze context usage, cache efficiency, and cost breakdown.</p>
        </div>

        <div onDrop={handleDrop} onDragOver={e => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)}
          onClick={() => { const input = document.createElement("input"); input.type = "file"; input.multiple = true; input.accept = ".txt,.json,.jsonl"; input.onchange = e => handleFiles(e.target.files); input.click(); }}
          style={{ border: `2px dashed ${dragOver ? C.accent : C.border}`, borderRadius: 10, padding: "28px 20px", textAlign: "center",
            cursor: "pointer", background: dragOver ? C.accentDim : "transparent", transition: "all 0.2s ease", marginBottom: 24 }}>
          <div style={{ fontSize: 14, color: dragOver ? C.accent : C.textMuted }}>{dragOver ? "Drop files here" : "Drop session logs here or click to browse"}</div>
          <div style={{ fontSize: 11, color: C.textDim, marginTop: 4 }}>Supports Codex (coder) and Claude Code (orchestrator/reviewer) formats</div>
        </div>

        {files.length > 0 && (
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 12 }}>
            <button onClick={() => setFiles([])} style={{ background: "transparent", border: `1px solid ${C.border}`,
              color: C.textMuted, padding: "4px 12px", borderRadius: 4, cursor: "pointer", fontSize: 11, fontFamily: "monospace" }}>Clear all</button>
          </div>
        )}

        {files.map((file, i) => (
          <div key={i} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 24, marginBottom: 20 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 16, fontFamily: "monospace", display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ color: C.textDim }}>📄</span> {file.name}
              {!file.parsed && <span style={{ color: C.red, fontSize: 11 }}> — unrecognized format</span>}
            </div>
            {file.parsed?.format === "codex" && <CodexReport parsed={file.parsed} />}
            {file.parsed?.format === "claude_code" && <ClaudeCodeReport parsed={file.parsed} />}
          </div>
        ))}

        {files.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 20px", color: C.textDim, fontSize: 13 }}>
            <div style={{ fontSize: 32, marginBottom: 12, opacity: 0.5 }}>⬆</div>
            No session logs loaded yet. Drop files above to start.
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
